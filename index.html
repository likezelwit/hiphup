<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat Realtime Firebase</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; margin: 0; }
        #chat-box { flex: 1; overflow-y: auto; padding: 20px; border-bottom: 1px solid #ccc; }
        #message-form { padding: 10px; display: flex; }
        #message-input { flex: 1; padding: 10px; }
        button { padding: 10px 20px; }
        .msg { margin-bottom: 10px; padding: 8px; border-radius: 5px; background: #f1f1f1; }
        .user-name { font-weight: bold; color: #007bff; display: block; }
    </style>
</head>
<body>

<div id="chat-box"></div>

<form id="message-form">
    <input type="text" id="username" placeholder="Nama kamu" required>
    <input type="text" id="message-input" placeholder="Ketik pesan..." required>
    <button type="submit">Kirim</button>
</form>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

    // Konfigurasi kamu
    const firebaseConfig = {
        apiKey: "AIzaSyBVDW4FjpABAPY1xUWmf49w0tRXfzggluU",
        authDomain: "zennie-6b1d1.firebaseapp.com",
        projectId: "zennie-6b1d1",
        storageBucket: "zennie-6b1d1.firebasestorage.app",
        messagingSenderId: "789293061077",
        appId: "1:789293061077:web:28ed8b33e6a0ea29c0235c"
    };

    // Init Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const messagesCol = collection(db, "messages");

    const chatBox = document.getElementById("chat-box");
    const messageForm = document.getElementById("message-form");

    // 1. Kirim Pesan
    messageForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        const user = document.getElementById("username").value;
        const text = document.getElementById("message-input").value;

        try {
            await addDoc(messagesCol, {
                name: user,
                message: text,
                timestamp: serverTimestamp()
            });
            document.getElementById("message-input").value = "";
        } catch (err) {
            console.error("Error kirim:", err);
        }
    });

    // 2. Baca Pesan Secara Realtime
    const q = query(messagesCol, orderBy("timestamp", "asc"));
    onSnapshot(q, (snapshot) => {
        chatBox.innerHTML = "";
        snapshot.forEach((doc) => {
            const data = doc.data();
            const div = document.createElement("div");
            div.classList.add("msg");
            div.innerHTML = `<span class="user-name">${data.name}</span> ${data.message}`;
            chatBox.appendChild(div);
        });
        chatBox.scrollTop = chatBox.scrollHeight;
    });
</script>

</body>
</html>
